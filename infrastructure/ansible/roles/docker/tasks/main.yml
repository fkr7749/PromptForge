---
# ============================================================
# Role: docker — Install Docker CE on ARM64 Ubuntu 22.04
# ============================================================
# Note: K3s ships with its own containerd runtime.
# Docker is installed here for building images locally on the
# control plane node and for docker CLI convenience.
# ============================================================

# ── 1. Prerequisites ─────────────────────────────────────────
- name: docker | Ensure APT keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [docker]

# ── 2. Docker GPG Key (ARM64) ─────────────────────────────────
- name: docker | Check if Docker GPG key is already installed
  ansible.builtin.stat:
    path: "{{ docker_apt_gpg_dest }}"
  register: docker_gpg_stat
  tags: [docker]

- name: docker | Download Docker GPG key (dearmored) for ARM64
  ansible.builtin.shell:
    cmd: >
      curl -fsSL {{ docker_apt_gpg_url }}
      | gpg --dearmor -o {{ docker_apt_gpg_dest }}
    creates: "{{ docker_apt_gpg_dest }}"
  become: true
  tags: [docker]
  # --creates makes this idempotent; only runs if file absent

- name: docker | Set correct permissions on Docker GPG key
  ansible.builtin.file:
    path: "{{ docker_apt_gpg_dest }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [docker]

# ── 3. Docker APT Repository (arm64) ─────────────────────────
- name: docker | Get Ubuntu codename (jammy for 22.04)
  ansible.builtin.command:
    cmd: lsb_release -cs
  register: ubuntu_codename
  changed_when: false
  tags: [docker]

- name: docker | Add Docker CE APT repository for arm64
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_repo_arch }}
      signed-by={{ docker_apt_gpg_dest }}]
      {{ docker_apt_repo_url }}
      {{ ubuntu_codename.stdout }}
      stable
    state: present
    filename: docker
    update_cache: true
  become: true
  tags: [docker]

# ── 4. Install Docker CE Packages ────────────────────────────
- name: docker | Install Docker CE and related packages
  ansible.builtin.apt:
    name:
      - "docker-ce"
      - "docker-ce-cli"
      - "containerd.io"
      - "docker-buildx-plugin"
      - "docker-compose-plugin"
    state: present
    update_cache: false
  become: true
  tags: [docker]
  notify: restart docker

# ── 5. Docker Daemon Configuration ───────────────────────────
- name: docker | Create Docker daemon configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [docker]

- name: docker | Configure Docker daemon (log rotation, storage driver)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "100m",
          "max-file": "3"
        },
        "storage-driver": "overlay2",
        "exec-opts": ["native.cgroupdriver=systemd"],
        "live-restore": true
      }
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart docker
  tags: [docker]

# ── 6. Enable and Start Docker Service ───────────────────────
- name: docker | Enable Docker service to start on boot
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true
  become: true
  tags: [docker]

# ── 7. Add ubuntu User to docker Group ───────────────────────
- name: docker | Add ubuntu user to docker group (no sudo needed for docker)
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true
  become: true
  tags: [docker]

# ── 8. Verify Docker Installation ────────────────────────────
- name: docker | Verify Docker is operational
  ansible.builtin.command:
    cmd: docker info
  become: true
  changed_when: false
  failed_when: false
  register: docker_info_result
  tags: [docker]

- name: docker | Print Docker version summary
  ansible.builtin.debug:
    msg: "Docker installed: {{ 'OK' if docker_info_result.rc == 0 else 'FAILED — check docker service' }}"
  tags: [docker]
