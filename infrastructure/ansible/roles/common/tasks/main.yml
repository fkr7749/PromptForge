---
# ============================================================
# Role: common — Base OS configuration for all K3s nodes
# ============================================================
# Applies to: all hosts in [k8s_cluster]
# Idempotent: yes — safe to re-run at any time
# ============================================================

# ── 1. APT Cache & Upgrades ──────────────────────────────────
- name: common | Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  tags: [common, packages]

- name: common | Upgrade all installed packages to latest
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  become: true
  tags: [common, packages]
  register: apt_upgrade_result
  changed_when: "'0 upgraded' not in apt_upgrade_result.stdout"

# ── 2. Install Required System Packages ──────────────────────
- name: common | Install base system packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: false
  become: true
  tags: [common, packages]

# ── 3. Kernel Modules for Container Networking ───────────────
- name: common | Ensure kernel modules file exists for persistence
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      # Loaded by Ansible for K3s / Kubernetes networking
      overlay
      br_netfilter
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: [common, kernel]

- name: common | Load kernel modules immediately
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  become: true
  loop: "{{ k8s_kernel_modules }}"
  tags: [common, kernel]

# ── 4. Sysctl — Kernel Parameters for Kubernetes ─────────────
- name: common | Apply sysctl parameters for Kubernetes networking
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value | string }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
    state: present
  become: true
  loop: "{{ k8s_sysctl_params | dict2items }}"
  tags: [common, sysctl]
  notify: reload sysctl

# ── 5. Timezone ───────────────────────────────────────────────
- name: common | Set system timezone to UTC
  community.general.timezone:
    name: "{{ system_timezone }}"
  become: true
  tags: [common, timezone]

# ── 6. UFW Firewall ───────────────────────────────────────────
- name: common | Set UFW default policy — deny incoming
  community.general.ufw:
    default: deny
    direction: incoming
  become: true
  tags: [common, firewall]
  notify: reload ufw

- name: common | Set UFW default policy — allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing
  become: true
  tags: [common, firewall]

- name: common | Apply UFW rules from group_vars
  community.general.ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  become: true
  loop: "{{ ufw_rules }}"
  tags: [common, firewall]
  notify: reload ufw

- name: common | Allow all traffic between K3s cluster nodes (intra-cluster)
  community.general.ufw:
    rule: allow
    src: "10.42.0.0/16"
    comment: "K3s pod CIDR — intra-cluster"
  become: true
  tags: [common, firewall]
  notify: reload ufw

- name: common | Allow all traffic within service CIDR
  community.general.ufw:
    rule: allow
    src: "10.43.0.0/16"
    comment: "K3s service CIDR — intra-cluster"
  become: true
  tags: [common, firewall]
  notify: reload ufw

- name: common | Enable UFW
  community.general.ufw:
    state: enabled
  become: true
  tags: [common, firewall]

# ── 7. fail2ban — SSH Brute Force Protection ──────────────────
- name: common | Ensure fail2ban configuration directory exists
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: [common, security]

- name: common | Deploy fail2ban SSH jail configuration
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    content: |
      # Managed by Ansible — do not edit manually
      [sshd]
      enabled  = true
      port     = ssh
      filter   = sshd
      logpath  = /var/log/auth.log
      maxretry = 5
      bantime  = 3600
      findtime = 600
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart fail2ban
  tags: [common, security]

- name: common | Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
    daemon_reload: false
  become: true
  tags: [common, security]

# ── 8. Disable Swap (required for Kubernetes) ─────────────────
- name: common | Disable swap immediately
  ansible.builtin.command:
    cmd: swapoff -a
  become: true
  changed_when: false
  tags: [common, swap]

- name: common | Remove swap entries from /etc/fstab to persist across reboots
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1  # Disabled by Ansible (K8s requires no swap)'
    backup: true
  become: true
  tags: [common, swap]

# ── 9. SSH Hardening ──────────────────────────────────────────
- name: common | Harden SSH configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    backup: true
  become: true
  loop:
    - { regexp: '^#?PermitRootLogin',      line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?X11Forwarding',        line: 'X11Forwarding no' }
    - { regexp: '^#?MaxAuthTries',         line: 'MaxAuthTries 3' }
    - { regexp: '^#?LoginGraceTime',       line: 'LoginGraceTime 20' }
    - { regexp: '^#?ClientAliveInterval',  line: 'ClientAliveInterval 300' }
    - { regexp: '^#?ClientAliveCountMax',  line: 'ClientAliveCountMax 2' }
  notify: restart sshd
  tags: [common, security, ssh]

# ── 10. Reboot if kernel was upgraded ─────────────────────────
- name: common | Check if reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  become: true
  register: reboot_required_file
  tags: [common, reboot]

- name: common | Reboot host if kernel upgrade requires it
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible after kernel upgrade"
    connect_timeout: 5
    reboot_timeout: 600
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: whoami
  become: true
  when: reboot_required_file.stat.exists
  tags: [common, reboot]
