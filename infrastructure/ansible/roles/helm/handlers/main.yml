---
# ============================================================
# Role: helm — Handlers
# ============================================================
# Helm itself is stateless — no daemon to restart.
# Handlers here are for any downstream effects.

- name: reload helm repos
  ansible.builtin.command:
    cmd: helm repo update
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
