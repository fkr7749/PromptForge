---
# ============================================================
# Role: helm — Install Helm + NGINX Ingress + cert-manager
# ============================================================
# Runs on: [control_plane] hosts only
# Requires: K3s server running and kubeconfig at k3s_kubeconfig_remote
# ============================================================

# ── 1. Install Helm ───────────────────────────────────────────
- name: helm | Check if helm is already installed at required version
  ansible.builtin.command:
    cmd: helm version --short
  register: helm_current_version
  changed_when: false
  failed_when: false
  become: true
  tags: [helm]

- name: helm | Download Helm installation script
  ansible.builtin.get_url:
    url: "{{ helm_install_script_url }}"
    dest: /tmp/get_helm.sh
    mode: "0755"
    force: true
  become: true
  when: helm_version not in (helm_current_version.stdout | default(''))
  tags: [helm]

- name: helm | Install Helm {{ helm_version }}
  ansible.builtin.command:
    cmd: /tmp/get_helm.sh --version {{ helm_version }}
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  when: helm_version not in (helm_current_version.stdout | default(''))
  tags: [helm]

- name: helm | Verify helm installation
  ansible.builtin.command:
    cmd: helm version --short
  become: true
  changed_when: false
  register: helm_verified
  tags: [helm]

- name: helm | Print installed Helm version
  ansible.builtin.debug:
    msg: "Helm version: {{ helm_verified.stdout }}"
  tags: [helm]

# ── 2. Update Helm Repositories ──────────────────────────────
- name: helm | Add NGINX Ingress Controller Helm repository
  ansible.builtin.command:
    cmd: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  tags: [helm, ingress]

- name: helm | Add cert-manager Helm repository
  ansible.builtin.command:
    cmd: helm repo add cert-manager https://charts.jetstack.io
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  tags: [helm, cert-manager]

- name: helm | Update all Helm repositories
  ansible.builtin.command:
    cmd: helm repo update
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  tags: [helm]

# ── 3. Install NGINX Ingress Controller ──────────────────────
- name: helm | Create ingress-nginx namespace
  ansible.builtin.command:
    cmd: >
      kubectl create namespace ingress-nginx
      --dry-run=client -o yaml
      | kubectl apply -f -
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  tags: [helm, ingress]

- name: helm | Install / upgrade NGINX Ingress Controller
  ansible.builtin.command:
    cmd: >
      helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
      --namespace ingress-nginx
      --create-namespace
      --set controller.service.type=LoadBalancer
      --set controller.service.annotations."oci\.oraclecloud\.com/load-balancer-type"=nlb
      --set controller.admissionWebhooks.enabled=false
      --set controller.replicaCount=1
      --set controller.resources.requests.cpu=100m
      --set controller.resources.requests.memory=128Mi
      --set controller.resources.limits.cpu=500m
      --set controller.resources.limits.memory=512Mi
      --set controller.metrics.enabled=true
      --set controller.metrics.serviceMonitor.enabled=true
      --set controller.metrics.serviceMonitor.additionalLabels.release=kube-prometheus-stack
      --set defaultBackend.enabled=true
      --timeout 5m
      --wait
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  register: nginx_install_result
  changed_when: "'deployed' in nginx_install_result.stdout or 'upgraded' in nginx_install_result.stdout"
  tags: [helm, ingress]

- name: helm | Wait for NGINX Ingress Controller pods to be ready
  ansible.builtin.command:
    cmd: >
      kubectl rollout status deployment/ingress-nginx-controller
      -n ingress-nginx
      --timeout=120s
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  retries: 3
  delay: 20
  tags: [helm, ingress]

# ── 4. Install cert-manager ───────────────────────────────────
- name: helm | Create cert-manager namespace
  ansible.builtin.command:
    cmd: >
      kubectl create namespace cert-manager
      --dry-run=client -o yaml
      | kubectl apply -f -
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  tags: [helm, cert-manager]

- name: helm | Install / upgrade cert-manager with CRDs
  ansible.builtin.command:
    cmd: >
      helm upgrade --install cert-manager cert-manager/cert-manager
      --namespace cert-manager
      --create-namespace
      --set installCRDs=true
      --set replicaCount=1
      --set resources.requests.cpu=50m
      --set resources.requests.memory=64Mi
      --set resources.limits.cpu=200m
      --set resources.limits.memory=256Mi
      --set webhook.resources.requests.cpu=25m
      --set webhook.resources.requests.memory=32Mi
      --set cainjector.resources.requests.cpu=25m
      --set cainjector.resources.requests.memory=64Mi
      --set prometheus.enabled=true
      --set prometheus.servicemonitor.enabled=true
      --set prometheus.servicemonitor.labels.release=kube-prometheus-stack
      --timeout 5m
      --wait
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  register: certmanager_install_result
  changed_when: "'deployed' in certmanager_install_result.stdout or 'upgraded' in certmanager_install_result.stdout"
  tags: [helm, cert-manager]

- name: helm | Wait for cert-manager webhook to be ready
  ansible.builtin.command:
    cmd: >
      kubectl rollout status deployment/cert-manager-webhook
      -n cert-manager
      --timeout=120s
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  retries: 5
  delay: 15
  tags: [helm, cert-manager]

# ── 5. Apply Let's Encrypt ClusterIssuers ────────────────────
- name: helm | Copy ClusterIssuer manifest to remote host
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../files/letsencrypt-clusterissuer.yaml"
    dest: /tmp/letsencrypt-clusterissuer.yaml
    mode: "0644"
  become: true
  tags: [helm, cert-manager, clusterissuer]

- name: helm | Wait for cert-manager CRDs to be established
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Established
      crd/clusterissuers.cert-manager.io
      --timeout=60s
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  retries: 5
  delay: 10
  tags: [helm, cert-manager, clusterissuer]

- name: helm | Apply Let's Encrypt ClusterIssuers
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/letsencrypt-clusterissuer.yaml
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  register: clusterissuer_result
  changed_when: "'configured' in clusterissuer_result.stdout or 'created' in clusterissuer_result.stdout"
  tags: [helm, cert-manager, clusterissuer]

- name: helm | Verify ClusterIssuers are ready
  ansible.builtin.command:
    cmd: kubectl get clusterissuers -o wide
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  register: clusterissuers_status
  tags: [helm, cert-manager, clusterissuer]

- name: helm | Print ClusterIssuer status
  ansible.builtin.debug:
    msg: "{{ clusterissuers_status.stdout_lines }}"
  tags: [helm, cert-manager, clusterissuer]

# ── 6. Summary ────────────────────────────────────────────────
- name: helm | Print all Helm releases
  ansible.builtin.command:
    cmd: helm list --all-namespaces
  become: true
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig_remote }}"
  changed_when: false
  register: helm_list
  tags: [helm]

- name: helm | Display Helm releases summary
  ansible.builtin.debug:
    msg: "{{ helm_list.stdout_lines }}"
  tags: [helm]
