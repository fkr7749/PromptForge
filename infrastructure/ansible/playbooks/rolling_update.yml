---
# ============================================================
# PromptForge — Rolling Update Playbook (rolling_update.yml)
# ============================================================
# Triggers a rolling restart of all Deployments in the
# promptforge-prod namespace.  Kubernetes replaces pods one
# at a time using the deployment's RollingUpdate strategy,
# ensuring zero downtime.
#
# Typical usage (CI/CD post-build):
#   ansible-playbook \
#     -i inventory/production.ini \
#     playbooks/rolling_update.yml \
#     -e "target_namespace=promptforge-prod"
#
# Optional extra vars:
#   target_namespace  — namespace to restart (default: promptforge-prod)
#   rollout_timeout   — kubectl rollout status timeout (default: 5m)
#   dry_run           — set to true to preview without restarting
# ============================================================

- name: "Rolling update — redeploy all PromptForge services"
  hosts: control_plane
  become: true
  gather_facts: false
  any_errors_fatal: true

  vars:
    target_namespace: "{{ namespace | default('promptforge-prod') }}"
    rollout_timeout: "{{ timeout | default('5m') }}"
    dry_run: "{{ preview | default(false) | bool }}"
    kubeconfig: "{{ k3s_kubeconfig_remote }}"

  tasks:

    # ── Pre-flight: verify cluster is healthy ─────────────────
    - name: "rolling_update | Verify cluster nodes are Ready before update"
      ansible.builtin.command:
        cmd: >
          kubectl get nodes
          --kubeconfig {{ kubeconfig }}
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.conditions[-1].type}{"\t"}{.status.conditions[-1].status}{"\n"}{end}'
      changed_when: false
      register: cluster_health

    - name: "rolling_update | Assert all nodes are in Ready state"
      ansible.builtin.assert:
        that:
          - "'NotReady' not in cluster_health.stdout"
        fail_msg: "One or more cluster nodes are NotReady. Aborting rolling update."
        success_msg: "All cluster nodes are Ready. Proceeding with rolling update."

    # ── List deployments to be restarted ─────────────────────
    - name: "rolling_update | List deployments in {{ target_namespace }}"
      ansible.builtin.command:
        cmd: >
          kubectl get deployments
          -n {{ target_namespace }}
          --kubeconfig {{ kubeconfig }}
          -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'
      changed_when: false
      register: deployments_list
      failed_when: deployments_list.rc != 0

    - name: "rolling_update | Print deployments scheduled for restart"
      ansible.builtin.debug:
        msg:
          - "Namespace   : {{ target_namespace }}"
          - "Dry run     : {{ dry_run }}"
          - "Deployments : {{ deployments_list.stdout_lines }}"

    # ── Abort if namespace has no deployments ─────────────────
    - name: "rolling_update | Skip if no deployments found"
      ansible.builtin.meta: end_play
      when: deployments_list.stdout_lines | length == 0

    # ── Rolling restart ───────────────────────────────────────
    - name: "rolling_update | Trigger rolling restart of all deployments"
      ansible.builtin.shell:
        cmd: >
          kubectl rollout restart deployment
          -n {{ target_namespace }}
          --kubeconfig {{ kubeconfig }}
      register: restart_result
      changed_when: true
      when: not dry_run

    - name: "rolling_update | Dry run — show what would be restarted"
      ansible.builtin.debug:
        msg: "[DRY RUN] Would restart all deployments in namespace: {{ target_namespace }}"
      when: dry_run

    - name: "rolling_update | Display restart output"
      ansible.builtin.debug:
        msg: "{{ restart_result.stdout_lines | default([]) }}"
      when: not dry_run

    # ── Wait for each deployment to roll out ──────────────────
    - name: "rolling_update | Wait for rollout to complete on each deployment"
      ansible.builtin.shell:
        cmd: >
          kubectl rollout status deployment/{{ item }}
          -n {{ target_namespace }}
          --timeout={{ rollout_timeout }}
          --kubeconfig {{ kubeconfig }}
      loop: "{{ deployments_list.stdout_lines }}"
      register: rollout_status
      changed_when: false
      when: not dry_run
      failed_when: rollout_status.rc != 0

    # ── Post-update health check ──────────────────────────────
    - name: "rolling_update | Get final pod status in {{ target_namespace }}"
      ansible.builtin.command:
        cmd: >
          kubectl get pods
          -n {{ target_namespace }}
          --kubeconfig {{ kubeconfig }}
          -o wide
      changed_when: false
      register: pod_status

    - name: "rolling_update | Display post-update pod status"
      ansible.builtin.debug:
        msg: "{{ pod_status.stdout_lines }}"

    # ── Check for any pods not in Running/Completed state ─────
    - name: "rolling_update | Detect unhealthy pods after rollout"
      ansible.builtin.command:
        cmd: >
          kubectl get pods
          -n {{ target_namespace }}
          --kubeconfig {{ kubeconfig }}
          --field-selector=status.phase!=Running,status.phase!=Succeeded
          -o jsonpath='{.items[*].metadata.name}'
      changed_when: false
      register: unhealthy_pods
      failed_when: false

    - name: "rolling_update | Warn if unhealthy pods detected"
      ansible.builtin.debug:
        msg: "WARNING: The following pods are not Running: {{ unhealthy_pods.stdout }}"
      when: unhealthy_pods.stdout | trim | length > 0

    - name: "rolling_update | Assert no unhealthy pods remain"
      ansible.builtin.assert:
        that:
          - unhealthy_pods.stdout | trim | length == 0
        fail_msg: >
          Rolling update completed but some pods are not healthy:
          {{ unhealthy_pods.stdout }}
          Run: kubectl describe pod <pod-name> -n {{ target_namespace }}
        success_msg: "All pods in {{ target_namespace }} are healthy after rolling update."
      when: not dry_run

    # ── Summary ───────────────────────────────────────────────
    - name: "rolling_update | Print rolling update summary"
      ansible.builtin.debug:
        msg:
          - "================================================="
          - " Rolling Update Complete"
          - "================================================="
          - "Namespace  : {{ target_namespace }}"
          - "Deployments: {{ deployments_list.stdout_lines | join(', ') }}"
          - "Timeout    : {{ rollout_timeout }}"
          - "Status     : {{ 'DRY RUN — no changes made' if dry_run else 'SUCCESS' }}"
          - "================================================="
