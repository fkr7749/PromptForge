---
# ============================================================
# PromptForge — Master Playbook (site.yml)
# ============================================================
# Provisions a complete K3s cluster with all components:
#   Play 1 : Base OS hardening       → all nodes
#   Play 2 : Docker CE               → all nodes
#   Play 3 : K3s control plane       → control_plane
#   Play 4 : K3s worker agents       → workers
#   Play 5 : Helm + Ingress + TLS    → control_plane
#   Play 6 : Monitoring stack        → control_plane
#
# Usage:
#   ansible-playbook -i inventory/production.ini playbooks/site.yml
#   ansible-playbook -i inventory/staging.ini    playbooks/site.yml
#
# Selective execution via tags:
#   --tags common       — run only Play 1
#   --tags docker       — run only Play 2
#   --tags k3s          — run Plays 3 + 4
#   --tags helm         — run Play 5
#   --tags monitoring   — run Play 6
#
# Dry-run (check mode):
#   ansible-playbook ... --check --diff
# ============================================================

# ── Play 1: Base OS Configuration (all nodes) ────────────────
- name: "Play 1 | Base OS hardening — all cluster nodes"
  hosts: k8s_cluster
  become: true
  gather_facts: true
  any_errors_fatal: true
  tags: [common]

  pre_tasks:
    - name: "play1 | Verify target is Ubuntu 22.04"
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version('22.04', '>=')
        fail_msg: >
          This playbook requires Ubuntu 22.04 or later.
          Found: {{ ansible_distribution }} {{ ansible_distribution_version }}
        success_msg: "OS check passed: {{ ansible_distribution }} {{ ansible_distribution_version }}"
      tags: [always]

    - name: "play1 | Verify host architecture is ARM64"
      ansible.builtin.assert:
        that:
          - ansible_architecture in ['aarch64', 'arm64']
        fail_msg: >
          This playbook targets ARM64 (Oracle Cloud A1) nodes.
          Found architecture: {{ ansible_architecture }}
        success_msg: "Architecture check passed: {{ ansible_architecture }}"
      tags: [always]

  roles:
    - role: common

# ── Play 2: Docker CE (all nodes) ────────────────────────────
- name: "Play 2 | Docker CE — all cluster nodes"
  hosts: k8s_cluster
  become: true
  gather_facts: false
  any_errors_fatal: true
  tags: [docker]

  roles:
    - role: docker

# ── Play 3: K3s Control Plane ────────────────────────────────
- name: "Play 3 | K3s control plane server"
  hosts: control_plane
  become: true
  gather_facts: false
  any_errors_fatal: true
  tags: [k3s, k3s_control]

  roles:
    - role: k3s_control

# ── Play 4: K3s Worker Agents ────────────────────────────────
- name: "Play 4 | K3s worker agents"
  hosts: workers
  become: true
  gather_facts: false
  any_errors_fatal: false
  serial: 1
  tags: [k3s, k3s_worker]

  # Depends on Play 3 — control plane token is set as a hostvars fact.
  # serial: 1 prevents race conditions during simultaneous registration.
  roles:
    - role: k3s_worker

  # Skip entirely if workers group is empty (staging single-node inventory)
  when: groups['workers'] | length > 0

# ── Play 5: Helm + Ingress + cert-manager ────────────────────
- name: "Play 5 | Helm, NGINX Ingress, cert-manager, ClusterIssuers"
  hosts: control_plane
  become: true
  gather_facts: false
  any_errors_fatal: true
  tags: [helm, ingress, cert-manager]

  roles:
    - role: helm

# ── Play 6: Monitoring Stack ──────────────────────────────────
- name: "Play 6 | Prometheus + Grafana + Loki monitoring stack"
  hosts: control_plane
  become: true
  gather_facts: false
  any_errors_fatal: false
  tags: [monitoring]

  roles:
    - role: monitoring

  post_tasks:
    - name: "play6 | Print post-deployment access summary"
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - " PromptForge Cluster Deployment Complete! "
          - "=========================================="
          - ""
          - "KUBECONFIG: {{ playbook_dir }}/../files/kubeconfig.yaml"
          - ""
          - "Access URLs (once DNS is configured):"
          - "  App:     https://{{ domain }}"
          - "  Grafana: https://grafana.{{ domain }}"
          - ""
          - "Next steps:"
          - "  1. Point DNS A records to the LoadBalancer external IP:"
          - "     kubectl get svc -n ingress-nginx"
          - "  2. Deploy the PromptForge app manifests:"
          - "     kubectl apply -k k8s/overlays/production/"
          - "  3. Verify cert-manager certificates are issued:"
          - "     kubectl get certificates -A"
          - "=========================================="
      tags: [always]
