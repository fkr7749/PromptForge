---
# ============================================================
# PromptForge — Cluster Bootstrap Playbook (k8s_setup.yml)
# ============================================================
# Provisions the K3s cluster and core infrastructure tooling
# WITHOUT the monitoring stack (Prometheus / Grafana / Loki).
#
# Use this playbook when:
#   - Setting up the cluster for the first time and monitoring
#     resources (10Gi+ PVCs) are not yet available
#   - Running in CI/CD to validate cluster config quickly
#   - Re-provisioning without touching the monitoring stack
#
# Plays:
#   Play 1 : Base OS hardening       → all nodes
#   Play 2 : Docker CE               → all nodes
#   Play 3 : K3s control plane       → control_plane
#   Play 4 : K3s worker agents       → workers
#   Play 5 : Helm + Ingress + TLS    → control_plane
#
# Usage:
#   ansible-playbook -i inventory/production.ini playbooks/k8s_setup.yml
#   ansible-playbook -i inventory/staging.ini    playbooks/k8s_setup.yml
#
# To add monitoring afterwards:
#   ansible-playbook -i inventory/production.ini playbooks/site.yml --tags monitoring
# ============================================================

# ── Play 1: Base OS Configuration (all nodes) ────────────────
- name: "Play 1 | Base OS hardening — all cluster nodes"
  hosts: k8s_cluster
  become: true
  gather_facts: true
  any_errors_fatal: true
  tags: [common]

  pre_tasks:
    - name: "play1 | Verify target is Ubuntu 22.04 ARM64"
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version('22.04', '>=')
          - ansible_architecture in ['aarch64', 'arm64']
        fail_msg: >
          This playbook requires Ubuntu 22.04+ on ARM64 (aarch64).
          Found: {{ ansible_distribution }} {{ ansible_distribution_version }}
          on {{ ansible_architecture }}.
        success_msg: >
          OS/arch check passed:
          {{ ansible_distribution }} {{ ansible_distribution_version }}
          {{ ansible_architecture }}
      tags: [always]

  roles:
    - role: common

# ── Play 2: Docker CE (all nodes) ────────────────────────────
- name: "Play 2 | Docker CE — all cluster nodes"
  hosts: k8s_cluster
  become: true
  gather_facts: false
  any_errors_fatal: true
  tags: [docker]

  roles:
    - role: docker

# ── Play 3: K3s Control Plane ────────────────────────────────
- name: "Play 3 | K3s control plane server"
  hosts: control_plane
  become: true
  gather_facts: false
  any_errors_fatal: true
  tags: [k3s, k3s_control]

  roles:
    - role: k3s_control

# ── Play 4: K3s Worker Agents ────────────────────────────────
- name: "Play 4 | K3s worker agents"
  hosts: workers
  become: true
  gather_facts: false
  any_errors_fatal: false
  serial: 1
  tags: [k3s, k3s_worker]

  roles:
    - role: k3s_worker

  when: groups['workers'] | length > 0

# ── Play 5: Helm + Ingress + cert-manager ────────────────────
- name: "Play 5 | Helm, NGINX Ingress, cert-manager, ClusterIssuers"
  hosts: control_plane
  become: true
  gather_facts: false
  any_errors_fatal: true
  tags: [helm, ingress, cert-manager]

  roles:
    - role: helm

  post_tasks:
    - name: "play5 | Cluster bootstrap complete — print summary"
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - " PromptForge Cluster Bootstrap Complete!  "
          - "=========================================="
          - ""
          - "KUBECONFIG saved to:"
          - "  {{ playbook_dir }}/../files/kubeconfig.yaml"
          - ""
          - "Cluster status:"
          - "  kubectl get nodes --kubeconfig {{ playbook_dir }}/../files/kubeconfig.yaml"
          - ""
          - "Next: deploy the application"
          - "  ansible-playbook -i inventory/production.ini playbooks/site.yml --tags monitoring"
          - "  kubectl apply -k k8s/overlays/production/"
          - "=========================================="
      tags: [always]
