# ============================================================
# PromptForge — Let's Encrypt ClusterIssuer Manifests
# ============================================================
# Applied by: roles/helm/tasks/main.yml
# Requires  : cert-manager v1.x installed with CRDs
#
# Two issuers are defined:
#   letsencrypt-staging  — Use this first to test. Rate limits
#                          are much more generous but certificates
#                          are NOT trusted by browsers.
#   letsencrypt-prod     — Trusted certificates. Rate limited to
#                          50 certs/domain/week. Use only after
#                          staging succeeds.
#
# Certificate usage example (Ingress annotation):
#   annotations:
#     cert-manager.io/cluster-issuer: "letsencrypt-prod"
#   spec:
#     tls:
#       - hosts:
#           - promptforge.example.com
#         secretName: promptforge-tls
#
# Replace the email field with your real contact email.
# cert-manager reads the email from the LETSENCRYPT_EMAIL
# environment variable at Ansible deploy time via group_vars/all.yml.
# ============================================================
---
# ── Staging ClusterIssuer ─────────────────────────────────────
# ACME v2 staging endpoint — browser-untrusted certificates.
# Use for initial validation that the HTTP01 challenge flow works
# and the domain is resolvable before switching to production.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/managed-by: ansible
    app.kubernetes.io/component: cert-manager
    promptforge.io/environment: staging
  annotations:
    # Ansible-managed — do not edit manually
    promptforge.io/provisioned-by: "ansible/roles/helm"
spec:
  acme:
    # Let's Encrypt staging ACME v2 directory
    server: https://acme-staging-v02.api.letsencrypt.org/directory

    # IMPORTANT: Replace with your actual email address.
    # Let's Encrypt uses this for expiry notifications.
    # In Ansible this is set via: letsencrypt_email (group_vars/all.yml)
    email: admin@promptforge.example.com

    # Private key secret — cert-manager creates this automatically.
    # Never delete this secret or you will be rate-limited on re-registration.
    privateKeySecretRef:
      name: letsencrypt-staging-account-key

    solvers:
      # ── HTTP01 Challenge (standard — no DNS provider needed) ─
      # cert-manager creates a temporary HTTP endpoint at:
      #   http://<domain>/.well-known/acme-challenge/<token>
      # NGINX Ingress Controller serves this endpoint.
      - http01:
          ingress:
            ingressClassName: nginx
            # Optional: pod template for the ACME solver pod
            podTemplate:
              spec:
                nodeSelector:
                  kubernetes.io/os: linux
                tolerations:
                  - key: "node-role.kubernetes.io/control-plane"
                    operator: "Exists"
                    effect: "NoSchedule"

---
# ── Production ClusterIssuer ──────────────────────────────────
# ACME v2 production endpoint — globally trusted certificates.
# Rate limit: 50 certificates per registered domain per week.
# Transition from staging only after HTTP01 challenge succeeds.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/managed-by: ansible
    app.kubernetes.io/component: cert-manager
    promptforge.io/environment: production
  annotations:
    # Ansible-managed — do not edit manually
    promptforge.io/provisioned-by: "ansible/roles/helm"
spec:
  acme:
    # Let's Encrypt production ACME v2 directory
    server: https://acme-v02.api.letsencrypt.org/directory

    # IMPORTANT: Replace with your actual contact email.
    # Receives expiry warnings and important account notifications.
    email: admin@promptforge.example.com

    # Private key secret for the ACME account registration.
    privateKeySecretRef:
      name: letsencrypt-prod-account-key

    solvers:
      # ── HTTP01 Challenge Solver ───────────────────────────
      # Handles all domains by default via NGINX Ingress.
      - http01:
          ingress:
            ingressClassName: nginx
            podTemplate:
              spec:
                nodeSelector:
                  kubernetes.io/os: linux
                tolerations:
                  - key: "node-role.kubernetes.io/control-plane"
                    operator: "Exists"
                    effect: "NoSchedule"
                # Resource requests to avoid eviction of solver pod
                containers:
                  - name: acmesolver
                    resources:
                      requests:
                        cpu: 10m
                        memory: 16Mi
                      limits:
                        cpu: 50m
                        memory: 64Mi
