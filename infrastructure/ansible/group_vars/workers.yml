---
# ============================================================
# PromptForge — Worker Node Group Variables
# ============================================================

# K3s role for nodes in this group
k3s_role: agent

# Worker node labels applied at registration time
# These can be used by Kubernetes node selectors / affinity rules
k3s_agent_node_labels:
  - "node-role.kubernetes.io/worker=true"
  - "promptforge/role=workload"

# K3s agent arguments
# --node-name    : use Ansible inventory_hostname for consistent naming
# --flannel-iface: use the primary NIC (eth0 on Oracle Ubuntu 22.04 ARM A1)
k3s_agent_args: >-
  agent
  --node-name {{ inventory_hostname }}
  --flannel-iface eth0

# Service name on worker nodes
k3s_service_name: "k3s-agent"

# Worker node K3s systemd unit
k3s_systemd_service: "k3s-agent.service"
