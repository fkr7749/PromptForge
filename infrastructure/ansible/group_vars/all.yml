---
# ============================================================
# PromptForge — Global Ansible Variables (all hosts)
# ============================================================

# ---------- Kubernetes / K3s ---------------------------------
k3s_version: "v1.29.4+k3s1"
k3s_install_script_url: "https://get.k3s.io"
k3s_install_dir: "/usr/local/bin"
k3s_config_dir: "/etc/rancher/k3s"
k3s_data_dir: "/var/lib/rancher/k3s"

# Networking CIDRs (must not overlap with VCN/host subnets on Oracle Cloud)
k3s_cluster_cidr: "10.42.0.0/16"
k3s_service_cidr: "10.43.0.0/16"

# ---------- Helm ---------------------------------------------
helm_version: "v3.14.4"
helm_install_script_url: "https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3"

# ---------- Docker -------------------------------------------
# Docker is installed for local image builds; K3s uses its own containerd runtime.
docker_version: "24.0"
docker_apt_repo_arch: "arm64"
docker_apt_repo_url: "https://download.docker.com/linux/ubuntu"
docker_apt_gpg_url: "https://download.docker.com/linux/ubuntu/gpg"
docker_apt_gpg_dest: "/etc/apt/keyrings/docker.gpg"

# ---------- Project ------------------------------------------
project_name: promptforge
k8s_namespace_prod: "promptforge-prod"
k8s_namespace_staging: "promptforge-staging"

# Domain resolved from environment at deploy time.
# Set DOMAIN in CI/CD or: export DOMAIN=promptforge.example.com
domain: "{{ lookup('env', 'DOMAIN') | default('promptforge.example.com', true) }}"

# Let's Encrypt email — required for cert-manager ACME registration.
# Set LETSENCRYPT_EMAIL in CI/CD or shell environment before running playbooks.
letsencrypt_email: "{{ lookup('env', 'LETSENCRYPT_EMAIL') | default('admin@' + domain, true) }}"

# ---------- System Packages ----------------------------------
common_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - ufw
  - fail2ban
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - python3-pip
  - jq
  - unzip

# ---------- Kernel Modules (required for K3s / containerd) ---
k8s_kernel_modules:
  - overlay
  - br_netfilter

# ---------- Sysctl settings for Kubernetes -------------------
k8s_sysctl_params:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1
  net.ipv6.conf.all.forwarding: 1
  fs.inotify.max_user_watches: 524288
  fs.inotify.max_user_instances: 512

# ---------- UFW Firewall Rules --------------------------------
ufw_rules:
  - { rule: allow, port: "22",    proto: tcp,  comment: "SSH" }
  - { rule: allow, port: "80",    proto: tcp,  comment: "HTTP" }
  - { rule: allow, port: "443",   proto: tcp,  comment: "HTTPS" }
  - { rule: allow, port: "6443",  proto: tcp,  comment: "K8s API Server" }
  - { rule: allow, port: "10250", proto: tcp,  comment: "kubelet metrics" }
  - { rule: allow, port: "10255", proto: tcp,  comment: "kubelet read-only" }
  - { rule: allow, port: "8472",  proto: udp,  comment: "Flannel VXLAN overlay" }
  - { rule: allow, port: "51820", proto: udp,  comment: "WireGuard (if enabled)" }
  - { rule: allow, port: "2379",  proto: tcp,  comment: "etcd client (HA only)" }
  - { rule: allow, port: "2380",  proto: tcp,  comment: "etcd peer (HA only)" }

# ---------- Timezone -----------------------------------------
system_timezone: "UTC"

# ---------- Monitoring stack ---------------------------------
monitoring_namespace: "monitoring"
grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('ChangeMe!Grafana2024', true) }}"
