# ============================================================
# PromptForge Ansible Configuration
# ============================================================
# This file is picked up automatically when you run ansible-playbook
# from within the infrastructure/ansible/ directory.
#
# Reference: https://docs.ansible.com/ansible/latest/reference_appendices/config.html
# ============================================================

[defaults]
# ── Inventory ─────────────────────────────────────────────────
inventory              = inventory/production.ini
# Override at runtime: -i inventory/staging.ini

# ── Roles ─────────────────────────────────────────────────────
roles_path             = roles

# ── Output ────────────────────────────────────────────────────
# YAML output is much more readable than the default oneline
stdout_callback        = yaml
callbacks_enabled      = profile_tasks, timer

# Show task timing in the playbook summary
# install: ansible-galaxy collection install ansible.posix community.general
callback_whitelist     = profile_tasks

# ── Connection ────────────────────────────────────────────────
remote_user            = ubuntu
private_key_file       = ~/.ssh/promptforge_oracle
host_key_checking      = False
timeout                = 30

# ── Performance ───────────────────────────────────────────────
forks                  = 5
pipelining             = True
gather_facts           = smart
fact_caching           = memory

# ── Retry files ───────────────────────────────────────────────
retry_files_enabled    = True
retry_files_save_path  = /tmp/ansible-retries

# ── Logging ───────────────────────────────────────────────────
# Uncomment to write a full execution log
# log_path               = /tmp/ansible-promptforge.log

# ── Deprecation warnings ──────────────────────────────────────
deprecation_warnings   = True
system_warnings        = True

# ── Diff mode ─────────────────────────────────────────────────
# Uncomment to always show diffs (equivalent to --diff flag)
# diff = True

[inventory]
# Enable auto-detection of host variables from the inventory file
enable_plugins = ini, host_list, auto

[ssh_connection]
# Reduce SSH multiplexing overhead
ssh_args               = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining             = True
retries                = 3

[privilege_escalation]
become                 = True
become_method          = sudo
become_user            = root
become_ask_pass        = False
