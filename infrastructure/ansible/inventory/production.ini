# PromptForge Production Inventory — 3-Node K3s Cluster
# Oracle Cloud A1 (ARM64) Ubuntu 22.04 VMs
#
# Before use: replace the placeholder IPs with your actual Oracle Cloud public IPs.
# Obtain them from: OCI Console → Compute → Instances → <instance> → Public IP Address
#
# SSH key provisioned by Terraform at ~/.ssh/promptforge_oracle
# Generate with: ssh-keygen -t ed25519 -f ~/.ssh/promptforge_oracle -C "promptforge-k3s"

[control_plane]
promptforge-control ansible_host=CONTROL_PLANE_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/promptforge_oracle

[workers]
promptforge-worker-1 ansible_host=WORKER_1_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/promptforge_oracle
promptforge-worker-2 ansible_host=WORKER_2_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/promptforge_oracle

[k8s_cluster:children]
control_plane
workers

[k8s_cluster:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30'
