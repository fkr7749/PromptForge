# PromptForge Staging Inventory — Single-Node K3s Cluster
# Oracle Cloud A1 (ARM64) Ubuntu 22.04 VM
#
# In staging, the control plane node acts as both server AND worker.
# The k3s_control role removes the control-plane taint so workloads can schedule here.
# No [workers] group is defined; k3s_worker play is a no-op on this inventory.
#
# Before use: replace STAGING_IP with your Oracle Cloud staging VM public IP.
# SSH key: ~/.ssh/promptforge_oracle (same key pair as production)

[control_plane]
promptforge-staging ansible_host=STAGING_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/promptforge_oracle

[workers]
# Empty — staging uses the control plane node to schedule all workloads.
# The k3s_control role sets --node-taint="" to allow pod scheduling here.

[k8s_cluster:children]
control_plane
workers

[k8s_cluster:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30'

# Staging-specific overrides
k3s_server_args_extra="--node-taint=''"
