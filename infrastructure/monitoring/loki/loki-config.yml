# Loki configuration — single-binary mode (suitable for K3s / small clusters)
# Storage: local filesystem  (swap to S3/GCS backend for production scale)

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# ── Query range limits ──────────────────────────────────────────────────────
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# ── Schema ─────────────────────────────────────────────────────────────────
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

# ── Ruler (alerting rules stored on disk) ──────────────────────────────────
ruler:
  alertmanager_url: http://alertmanager:9093
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  enable_api: true
  enable_alertmanager_v2: true

# ── Ingester ───────────────────────────────────────────────────────────────
ingester:
  wal:
    enabled: true
    dir: /loki/wal
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period: 5m
  max_chunk_age: 1h
  chunk_target_size: 1536000
  chunk_retain_period: 30s

# ── Compactor ──────────────────────────────────────────────────────────────
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# ── Limits ────────────────────────────────────────────────────────────────
limits_config:
  # Retention: keep logs for 30 days in production
  retention_period: 720h
  # Ingestion rate
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # Query limits
  max_query_lookback: 720h
  max_query_length: 721h
  max_entries_limit_per_query: 10000
  max_streams_per_user: 10000
  # Labels
  max_label_names_per_series: 30
  max_label_value_length: 2048
  reject_old_samples: true
  reject_old_samples_max_age: 168h

# ── Frontend ──────────────────────────────────────────────────────────────
frontend:
  max_outstanding_per_tenant: 256
  compress_responses: true
  log_queries_longer_than: 5s

# ── Table manager (legacy; kept for tsdb compat) ──────────────────────────
table_manager:
  retention_deletes_enabled: false
  retention_period: 0s

# ── Analytics ─────────────────────────────────────────────────────────────
analytics:
  reporting_enabled: false
