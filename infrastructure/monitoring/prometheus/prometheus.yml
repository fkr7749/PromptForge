global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'promptforge-prod'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

rule_files:
  - "alert-rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Kubernetes pod auto-discovery via annotations:
  #   prometheus.io/scrape: "true"
  #   prometheus.io/path: /metrics   (optional, defaults to /metrics)
  #   prometheus.io/port: "NNNN"     (optional, defaults to the pod's first port)
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: 'true'
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: app
      - source_labels: [__meta_kubernetes_pod_label_version]
        action: replace
        target_label: version

  # ── PromptForge services (static) ─────────────────────────────────────────
  - job_name: 'auth-service'
    static_configs:
      - targets:
          - 'auth-service.promptforge-prod.svc.cluster.local:4001'
        labels:
          service: 'auth-service'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'prompt-service'
    static_configs:
      - targets:
          - 'prompt-service.promptforge-prod.svc.cluster.local:4002'
        labels:
          service: 'prompt-service'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'ai-execution'
    static_configs:
      - targets:
          - 'ai-execution.promptforge-prod.svc.cluster.local:4003'
        labels:
          service: 'ai-execution'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'playground'
    static_configs:
      - targets:
          - 'playground.promptforge-prod.svc.cluster.local:4004'
        labels:
          service: 'playground'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'search-service'
    static_configs:
      - targets:
          - 'search-service.promptforge-prod.svc.cluster.local:4005'
        labels:
          service: 'search-service'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'analytics'
    static_configs:
      - targets:
          - 'analytics.promptforge-prod.svc.cluster.local:4006'
        labels:
          service: 'analytics'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'user-service'
    static_configs:
      - targets:
          - 'user-service.promptforge-prod.svc.cluster.local:4007'
        labels:
          service: 'user-service'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'marketplace'
    static_configs:
      - targets:
          - 'marketplace.promptforge-prod.svc.cluster.local:4008'
        labels:
          service: 'marketplace'
    metrics_path: /metrics
    scrape_interval: 15s
