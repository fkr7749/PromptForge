global:
  imageRegistry: "ghcr.io"
  imageOwner: "fkr7749"
  imageTag: "latest"
  imagePullPolicy: "Always"
  environment: "production"

authService:
  enabled: true
  replicas: 1
  image:
    name: "promptforge-auth-service"
  service:
    port: 4001
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

