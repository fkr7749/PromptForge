apiVersion: v1
kind: ConfigMap
metadata:
  name: promptforge-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptforge.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  LOG_LEVEL: "error"
  AUTH_SERVICE_URL: "http://{{ .Release.Name }}-auth-service:4001"
  PROMPT_SERVICE_URL: "http://{{ .Release.Name }}-prompt-service:4002"
  AI_SERVICE_URL: "http://{{ .Release.Name }}-ai-execution:4003"
  PLAYGROUND_SERVICE_URL: "http://{{ .Release.Name }}-playground:4004"
  SEARCH_SERVICE_URL: "http://{{ .Release.Name }}-search-service:4005"
  ANALYTICS_SERVICE_URL: "http://{{ .Release.Name }}-analytics:4006"
  USER_SERVICE_URL: "http://{{ .Release.Name }}-user-service:4007"
  MARKETPLACE_SERVICE_URL: "http://{{ .Release.Name }}-marketplace:4008"
  SAFETY_SERVICE_URL: "http://{{ .Release.Name }}-safety-service:4009"
