{{- if .Values.safetyService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "promptforge.fullname" . }}-safety-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: safety-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: safety-service
    {{- include "promptforge.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.safetyService.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
