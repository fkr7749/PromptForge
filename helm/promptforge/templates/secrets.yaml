{{/*
  This template documents the required secret: promptforge-secrets.
  The secret is NOT created automatically to avoid storing sensitive values
  in version control. Create it manually before installing this chart.

  Required keys:
    DATABASE_URL     — PostgreSQL connection string
    REDIS_URL        — Redis connection string
    GROQ_API_KEY     — Groq AI API key
    JWT_SECRET       — Secret used to sign JWT tokens (min 32 chars)
    NEXTAUTH_SECRET  — NextAuth.js secret (min 32 chars)

  See NOTES.txt for the exact kubectl command.
*/}}
{{- $secret := lookup "v1" "Secret" .Release.Namespace "promptforge-secrets" }}
{{- if not $secret }}
{{- fail "Required secret 'promptforge-secrets' not found in namespace {{ .Release.Namespace }}. Please create it before installing. Run: helm show notes promptforge/promptforge for instructions." }}
{{- end }}
