{{- if .Values.marketplace.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "promptforge.fullname" . }}-marketplace
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: marketplace
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: marketplace
    {{- include "promptforge.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.marketplace.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
