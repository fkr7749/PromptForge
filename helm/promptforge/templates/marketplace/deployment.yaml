{{- if .Values.marketplace.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "promptforge.fullname" . }}-marketplace
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: marketplace
spec:
  replicas: {{ .Values.marketplace.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: marketplace
      {{- include "promptforge.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: marketplace
        {{- include "promptforge.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4008"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: marketplace
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imageOwner }}/{{ .Values.marketplace.image.name }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 4008
              protocol: TCP
          envFrom:
            - configMapRef:
                name: promptforge-config
            - secretRef:
                name: promptforge-secrets
          resources:
            {{- toYaml .Values.marketplace.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4008
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4008
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: 4008
            failureThreshold: 30
            periodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values: [marketplace]
                topologyKey: kubernetes.io/hostname
{{- end }}
