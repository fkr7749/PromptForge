{{- if .Values.aiExecution.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "promptforge.fullname" . }}-ai-execution
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-execution
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "promptforge.fullname" . }}-ai-execution
  minReplicas: {{ .Values.aiExecution.replicas }}
  maxReplicas: {{ mul .Values.aiExecution.replicas 3 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
{{- end }}
