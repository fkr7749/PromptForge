{{- if .Values.aiExecution.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "promptforge.fullname" . }}-ai-execution
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-execution
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: ai-execution
    {{- include "promptforge.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.aiExecution.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
