{{- if .Values.analytics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "promptforge.fullname" . }}-analytics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promptforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: analytics
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: analytics
    {{- include "promptforge.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.analytics.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
