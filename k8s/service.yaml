apiVersion: v1
kind: Service
metadata:
  name: promptforge-frontend
  namespace: promptforge
  labels:
    app: promptforge
    component: frontend
spec:
  type: NodePort
  selector:
    app: promptforge
    component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
