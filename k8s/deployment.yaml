apiVersion: apps/v1
kind: Deployment
metadata:
  name: promptforge-frontend
  namespace: promptforge
  labels:
    app: promptforge
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promptforge
      component: frontend
  template:
    metadata:
      labels:
        app: promptforge
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/fkr7749/promptforge-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
