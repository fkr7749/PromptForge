name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PNPM_VERSION: '9.12.0'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  # ─── Typecheck & Lint ───────────────────────────────────────────────────────
  quality:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Must run before typecheck — packages/database imports from generated/client
      - name: Generate Prisma client
        run: pnpm --filter @promptforge/database db:generate

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Lint (all packages)
        run: pnpm lint
        continue-on-error: true

  # ─── Frontend Build ─────────────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @promptforge/database db:generate

      - name: Build frontend
        run: pnpm --filter @promptforge/frontend build
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://promptforge.vercel.app' }}

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: apps/frontend/.next
          retention-days: 3

  # ─── Docker Build & Push ────────────────────────────────────────────────────
  docker:
    name: Docker — ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: apps/frontend/Dockerfile
            image: promptforge-frontend
          - dockerfile: apps/services/auth-service/Dockerfile
            image: promptforge-auth-service
          - dockerfile: apps/services/prompt-service/Dockerfile
            image: promptforge-prompt-service
          - dockerfile: apps/services/ai-execution/Dockerfile
            image: promptforge-ai-execution
          - dockerfile: apps/services/playground/Dockerfile
            image: promptforge-playground
          - dockerfile: apps/services/search-service/Dockerfile
            image: promptforge-search-service
          - dockerfile: apps/services/analytics/Dockerfile
            image: promptforge-analytics
          - dockerfile: apps/services/user-service/Dockerfile
            image: promptforge-user-service
          - dockerfile: apps/services/marketplace/Dockerfile
            image: promptforge-marketplace
          - dockerfile: apps/services/safety-service/Dockerfile
            image: promptforge-safety-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
