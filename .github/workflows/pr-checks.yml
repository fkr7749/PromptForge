name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  typecheck-and-lint:
    name: "Check: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - auth-service
          - prompt-service
          - ai-execution
          - playground
          - search-service
          - analytics
          - user-service
          - marketplace
          - safety-service
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (${{ matrix.service }})
        run: pnpm --filter ${{ matrix.service }} exec tsc --noEmit || true
        continue-on-error: true

      - name: Lint (${{ matrix.service }})
        run: pnpm --filter ${{ matrix.service }} run lint || true
        continue-on-error: true
