name: PR Checks

# ci.yml already runs typecheck + lint + build on every pull_request.
# This workflow adds a lightweight PR-only summary check for the GitHub
# "required status checks" feature if you ever enable branch protection.

on:
  pull_request:
    branches: [main, develop]

jobs:
  pr-ready:
    name: PR Ready Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.12.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @promptforge/database db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: PR check passed
        run: echo "All checks passed — PR is ready for review"
