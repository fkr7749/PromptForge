name: PromptForge CI/CD Pipeline

on:
  # Manual trigger only — requires KUBECONFIG_STAGING + KUBECONFIG_PRODUCTION secrets.
  # Automatic CI is handled by ci.yml. Run this workflow only when deploying to K8s.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/promptforge

jobs:
  # ── Stage 1: Code Quality ──────────────────────────────────────────────────
  quality:
    name: "Quality: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - auth-service
          - prompt-service
          - ai-execution
          - playground
          - search-service
          - analytics
          - user-service
          - marketplace
          - safety-service
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (${{ matrix.service }})
        run: pnpm --filter ${{ matrix.service }} exec tsc --noEmit || true
        continue-on-error: true

      - name: Lint (${{ matrix.service }})
        run: pnpm --filter ${{ matrix.service }} run lint || true
        continue-on-error: true

  # ── Stage 2: Tests ─────────────────────────────────────────────────────────
  test:
    name: "Test: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: promptforge_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
        ports:
          - 6379:6379
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - prompt-service
          - ai-execution
          - playground
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (${{ matrix.service }})
        run: pnpm --filter ${{ matrix.service }} run test --passWithNoTests || true
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/promptforge_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          NODE_ENV: test

  # ── Stage 3: Build & Push Docker Images ───────────────────────────────────
  build:
    name: "Build: ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: apps/frontend
            image: promptforge-frontend
          - service: auth-service
            context: apps/services/auth-service
            image: promptforge-auth-service
          - service: prompt-service
            context: apps/services/prompt-service
            image: promptforge-prompt-service
          - service: ai-execution
            context: apps/services/ai-execution
            image: promptforge-ai-execution
          - service: playground
            context: apps/services/playground
            image: promptforge-playground
          - service: search-service
            context: apps/services/search-service
            image: promptforge-search-service
          - service: analytics
            context: apps/services/analytics
            image: promptforge-analytics
          - service: user-service
            context: apps/services/user-service
            image: promptforge-user-service
          - service: marketplace
            context: apps/services/marketplace
            image: promptforge-marketplace
          - service: safety-service
            context: apps/services/safety-service
            image: promptforge-safety-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Stage 4: Security Scan ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ github.repository_owner }}/promptforge-frontend:latest"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
        continue-on-error: true

  # ── Stage 5: Deploy to Staging ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.promptforge.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: kubectl create namespace promptforge-staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/Update secrets
        run: |
          kubectl create secret generic promptforge-secrets \
            --namespace=promptforge-staging \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL || 'redis://localhost:6379' }}" \
            --from-literal=GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to staging
        run: |
          helm upgrade --install promptforge-staging ./helm/promptforge \
            --namespace promptforge-staging \
            --values helm/promptforge/values-staging.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageOwner=${{ github.repository_owner }} \
            --wait --timeout=5m

      - name: Smoke test
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/instance=promptforge-staging \
            -n promptforge-staging --timeout=120s
          echo "Staging deployment successful"

  # ── Stage 6: Deploy to Production ─────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://promptforge.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: kubectl create namespace promptforge-prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/Update secrets
        run: |
          kubectl create secret generic promptforge-secrets \
            --namespace=promptforge-prod \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL || 'redis://localhost:6379' }}" \
            --from-literal=GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to production (rolling update)
        run: |
          helm upgrade --install promptforge ./helm/promptforge \
            --namespace promptforge-prod \
            --values helm/promptforge/values-production.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageOwner=${{ github.repository_owner }} \
            --wait --timeout=10m

      - name: Verify all deployments rolled out
        run: |
          kubectl rollout status deployment -n promptforge-prod --timeout=5m

      - name: Notify Slack on success
        if: success() && secrets.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "PromptForge deployed to production\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}\nhttps://promptforge.example.com"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify Slack on failure
        if: failure() && secrets.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {"text": "PromptForge production deploy FAILED\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
